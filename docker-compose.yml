services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 3001
    ports:
      - "3001:3001"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DISABLE_HMR=false
      - VITE_API_PROXY_TARGET=http://host.docker.internal:4000
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  web-node-modules:
